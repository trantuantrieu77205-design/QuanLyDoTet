# C\u1ea5u h\u00ecnh c\u1ed5ng ch\u1ea1y (Render s\u1ebd t\u1ef1 c\u1ea5p c\u1ed5ng qua bi\u1ebfn PORT)
server.port=${PORT:8080}

# C\u1ea5u h\u00ecnh Database PostgreSQL (T\u1ef1 \u0111\u1ed9ng nh\u1eadn di\u1ec7n m\u00f4i tr\u01b0\u1eddng)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/quanlydotet}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:123456}

# C\u1ea5u h\u00ecnh Hibernate cho PostgreSQL
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# C\u1ea5u h\u00ecnh giao di\u1ec7n JSP
spring.mvc.view.prefix=/WEB-INF/jsp/
spring.mvc.view.suffix=.jsp